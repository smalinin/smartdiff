name: SmartDiff Nuitka

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/smartdiff-nuitka.yml"
      - "pyproject.toml"
#      - "src/smartdiff/**"
#      - "smartdiff_nuitka_windows.py"
#      - "smartdiff_nuitka_linux.py"
#      - "smartdiff_nuitka_macos.py"
  pull_request:
    paths:
      - ".github/workflows/smartdiff-nuitka.yml"
      - "pyproject.toml"
#      - "src/smartdiff/**"
#      - "smartdiff_nuitka_windows.py"
#      - "smartdiff_nuitka_linux.py"
#      - "smartdiff_nuitka_macos.py"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            launcher: smartdiff_nuitka_windows.py
            artifact: SmartDiff-Windows-Nuitka
            artifact_path: dist/nuitka_windows
          - name: Linux
            os: ubuntu-latest
            launcher: smartdiff_nuitka_linux.py
            artifact: SmartDiff-Linux-Nuitka
            artifact_path: dist/nuitka_linux
          - name: macOS
            os: macos-latest
            launcher: smartdiff_nuitka_macos.py
            artifact: SmartDiff-macOS-Nuitka
            artifact_path: dist/nuitka_macos
          - name: macOS x86
            os: macos-latest
            launcher: smartdiff_nuitka_macos_x86.py
            artifact: SmartDiff-macOS_x86-Nuitka
            artifact_path: dist/nuitka_macos_x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: python -m pip install uv

      - name: Verify Python sources
        run: uv run python -m compileall src smartdiff_nuitka_windows.py smartdiff_nuitka_linux.py smartdiff_nuitka_macos.py  smartdiff_nuitka_macos_x86.py

      - name: Build with Nuitka
        run: uv run --with nuitka python -m nuitka ${{ matrix.launcher }}

      - name: Upload Nuitka artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
